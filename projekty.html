<script>
/* project filter chips (visual toggle) */
document.querySelectorAll('.chip').forEach(function(c){
  c.addEventListener('click',function(){
    document.querySelectorAll('.chip').forEach(function(x){
      x.style.background='transparent';x.style.color='#fff';
    });
    c.style.background='#fff';c.style.color='#0a1324';
  });
});
</script>
